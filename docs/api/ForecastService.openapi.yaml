                         demoted_by_simulation: true when a negative adjustment crossed the 0.50 acceptance threshold.
                simPathConfidence:
                    type: number
                    format: double
                demotedBySimulation:
                    type: boolean
                resolution:
                    $ref: '#/components/schemas/ResolutionSpec'
